resources:
  jobs:
    sf_pipeline:
      name: "solvency_ii_standard_formula_pipeline"
      parameters:
        - name: catalog_name
          default: ${var.catalog_name}
        - name: schema_name
          default: ${var.schema_name}
        - name: reporting_date
          default: ${var.reporting_date}
        - name: entity_lei
          default: ${var.entity_lei}
        - name: entity_name
          default: ${var.entity_name}

      tasks:
        - task_key: generate_triangle_data
          notebook_task:
            notebook_path: src/notebooks/20_generate_triangle_data.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              reporting_date: "{{job.parameters.reporting_date}}"
              entity_name: "{{job.parameters.entity_name}}"
          environment_key: default

        - task_key: chain_ladder
          depends_on:
            - task_key: generate_triangle_data
          notebook_task:
            notebook_path: src/notebooks/21_silver_chain_ladder.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              reporting_date: "{{job.parameters.reporting_date}}"
          environment_key: default

        - task_key: gold_s1901
          depends_on:
            - task_key: chain_ladder
          notebook_task:
            notebook_path: src/notebooks/22_gold_s1901.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              reporting_date: "{{job.parameters.reporting_date}}"
              entity_lei: "{{job.parameters.entity_lei}}"
          environment_key: default

        - task_key: gold_s2606
          depends_on:
            - task_key: chain_ladder
          notebook_task:
            notebook_path: src/notebooks/23_gold_s2606.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              reporting_date: "{{job.parameters.reporting_date}}"
              entity_lei: "{{job.parameters.entity_lei}}"
          environment_key: default

        - task_key: validation_sf
          depends_on:
            - task_key: gold_s1901
            - task_key: gold_s2606
          notebook_task:
            notebook_path: src/notebooks/24_validation_sf.py
            base_parameters:
              catalog_name: "{{job.parameters.catalog_name}}"
              schema_name: "{{job.parameters.schema_name}}"
              reporting_date: "{{job.parameters.reporting_date}}"
          environment_key: default

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - numpy
